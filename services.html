<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="portal-main">
        <h2 class="page-title">Astro Services by Pt. Deepak Dubey</h2>

        <section class="page-container">
            <div class="main-content">
                <div class="services-grid">
                    <article class="service-card">
                        <div class="card-icon">!</div>
                        <h3>Urgent Talk</h3>
                        <p class="price">Rs. 5100 / US$ 65</p>
                        <button class="request-btn" onclick="goToCheckout('Urgent Talk', 5100)">Request Now</button>
                    </article>

                    <article class="service-card">
                        <div class="card-icon">T</div>
                        <h3>Premium Talk</h3>
                        <p class="price">Rs. 2500</p>
                        <button class="request-btn" onclick="goToCheckout('Premium Talk', 2500)">Request Now</button>
                    </article>

                    <article class="service-card">
                        <div class="card-icon">C</div>
                        <h3>Career</h3>
                        <p class="time-options">10 min consultation</p>
                        <p class="price">Rs. 1500</p>
                        <button class="request-btn" onclick="goToCheckout('Career', 1500)">Request Now</button>
                    </article>
                </div>
            </div>

            <aside class="sidebar">
                <div class="sidebar-box">
                    <h3>Astro Tips Online Services</h3>
                    <ul>
                        <li><a href="checkout.html?service=Urgent%20Talk&amp;price=5100">Urgent Talk</a></li>
                        <li><a href="checkout.html?service=Premium%20Talk&amp;price=2500">Talk to Astrologer</a></li>
                        <li><a href="checkout.html?service=Match%20Making&amp;price=2000">Marriage Relationship Talk</a></li>
                        <li><a href="checkout.html?service=Career&amp;price=1500">Career Consultation</a></li>
                    </ul>
                </div>
            </aside>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
